services:
  - type: web
    name: ag-esteira-credito
    runtime: node
    buildCommand: echo "no build"
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: DATA_FILE
        value: /var/data/state.json
    disk:
      name: ag-esteira-data
      mountPath: /var/data
      sizeGB: 1
